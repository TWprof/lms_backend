name: Deploying to EC2 Instance
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  job1:
    runs-on: ubuntu-latest
    env:
        EC2_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        EC2_URL: ${{ secrets.HOST }}
        EC2_USERNAME: ${{ secrets.USER }}
    steps:
      - name: Setup SSH for EC2
        uses: omarhosny206/setup-ssh-for-ec2@v1.0.0
        with:
            EC2_SSH_PRIVATE_KEY: $EC2_SSH_PRIVATE_KEY
            EC2_URL: $EC2_URL
      # then you can run commands/scripts directly on the EC2 instance e.g.:
      - name: Create a new file on the EC2 instance with "hello-world"
        run: ssh -o StrictHostKeyChecking=no $USER@$HOST "echo "hello-world" >> new_file.txt"
  job2:
    runs-on: ubuntu-latest     
    steps: 
      - name: Checkout code
        uses: actions/checkout@v2
  
      - name: Run remote command via SSH
        uses: D3rHase/ssh-command-action@latest
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          user: ${{ secrets.USER }}
          private_key: ${{ secrets.PRIVATE_KEY }}
          host_fingerprint: ${{ secrets.HOST_FINGERPRINT }}
          command: |
            cd /home/ubuntu/lms_backend
            git pull origin main
            cd /home/ubuntu/
            forever restart lms_backend/index.js
